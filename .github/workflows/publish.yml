name: Publish Docker images

on:
  push:
    tags:
      - '*'
      - '!*-ux'
      - '!*-prerelease'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BUN_PREFER_BASELINE: "always"

jobs:
  # Full integration validation must pass before any Docker build starts.
  # The integration-gate workflow runs on the same tag push event;
  # this job waits for it to complete successfully.
  wait-for-integration:
    name: Wait for integration gate
    runs-on: ubuntu-latest
    steps:
      - name: Wait for integration-gate workflow
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const headSha = context.sha;
            const workflowName = 'Integration gate';
            const maxWaitMs = 30 * 60 * 1000; // 30 minutes
            const pollMs = 15_000;
            const started = Date.now();

            core.info(`Waiting for "${workflowName}" to complete on ${headSha}...`);

            while (Date.now() - started < maxWaitMs) {
              const runs = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo,
                head_sha: headSha,
                per_page: 20,
              });

              const match = runs.data.workflow_runs.find(
                (run) => run.name === workflowName
              );

              if (match) {
                if (match.status === 'completed') {
                  if (match.conclusion === 'success') {
                    core.info(`Integration gate passed (run ${match.id}).`);
                    return;
                  }
                  core.setFailed(`Integration gate failed with conclusion: ${match.conclusion} (run ${match.id}).`);
                  return;
                }
                core.info(`Integration gate status: ${match.status} — polling again in ${pollMs / 1000}s...`);
              } else {
                core.info(`Integration gate run not found yet — polling again in ${pollMs / 1000}s...`);
              }

              await new Promise((resolve) => setTimeout(resolve, pollMs));
            }

            core.setFailed('Timed out waiting for integration gate workflow.');

  # Repo-owned boundary: publish smoke already routes through `make publish-smoke`.
  # Workflow-native boundary: reading pinned runtime versions from repo files stays here
  # because the values are consumed immediately as job outputs inside GitHub Actions.
  resolve-runtime-versions:
    name: Read pinned runtime versions
    runs-on: ubuntu-latest
    outputs:
      bun_version: ${{ steps.resolve-bun.outputs.version }}
      restic_version: ${{ steps.resolve-restic.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read Bun version from repo file
        id: resolve-bun
        run: |
          version=$(tr -d '[:space:]' < BUN_VERSION)
          if [ -z "$version" ]; then
            echo "BUN_VERSION file is empty"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Read restic version from repo file
        id: resolve-restic
        run: |
          version=$(tr -d '[:space:]' < RESTIC_VERSION)
          if [ -z "$version" ]; then
            echo "RESTIC_VERSION file is empty"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-portable-artifacts:
    name: Build portable artifact (${{ matrix.platform }}-${{ matrix.arch }})
    needs: wait-for-integration
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
            runner: ubuntu-24.04
          - platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - platform: macos
            arch: arm64
            runner: macos-14
          - platform: windows
            arch: x64
            runner: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version-file: BUN_VERSION

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build portable artifact
        run: bun run release:build-portable

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: piclaw-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}-portable
          path: artifacts/release/*
          if-no-files-found: error

  build-experimental-shell-artifacts:
    name: Build experimental shell (${{ matrix.platform }}-${{ matrix.arch }})
    needs: wait-for-integration
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
            runner: ubuntu-24.04
          - platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - platform: macos
            arch: arm64
            runner: macos-14
          - platform: windows
            arch: x64
            runner: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version-file: BUN_VERSION

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build experimental shell artifact
        run: bun run release:build-experimental-shell

      - name: Upload experimental shell artifact
        uses: actions/upload-artifact@v4
        with:
          name: piclaw-desktop-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/release/piclaw-desktop-*
          if-no-files-found: error

  # Build/push remains workflow-native because it is GitHub-runner-specific Docker orchestration.
  # Build AMD64 image on native Intel runner
  build-amd64:
    name: Build AMD64 image
    needs: [wait-for-integration, resolve-runtime-versions]
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push AMD64 image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64
          build-args: |
            BUN_VERSION=${{ needs.resolve-runtime-versions.outputs.bun_version }}
            BUN_PREFER_BASELINE=${{ env.BUN_PREFER_BASELINE }}

      - name: Smoke test AMD64 image
        continue-on-error: true
        timeout-minutes: 5
        env:
          STATIC_TIMEOUT_SEC: "120"
          HTTP_TIMEOUT_SEC: "180"
        run: |
          make publish-smoke \
            IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" \
            PLATFORM="linux/amd64" \
            EXPECTED_BUN_VERSION="${{ needs.resolve-runtime-versions.outputs.bun_version }}" \
            EXPECTED_RESTIC_VERSION="${{ needs.resolve-runtime-versions.outputs.restic_version }}"

  # Build ARM64 image on native ARM runner
  build-arm64:
    name: Build ARM64 image
    needs: [wait-for-integration, resolve-runtime-versions]
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push ARM64 image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64
          build-args: |
            BUN_VERSION=${{ needs.resolve-runtime-versions.outputs.bun_version }}
            BUN_PREFER_BASELINE=${{ env.BUN_PREFER_BASELINE }}

      - name: Smoke test ARM64 image
        continue-on-error: true
        timeout-minutes: 5
        env:
          STATIC_TIMEOUT_SEC: "120"
          HTTP_TIMEOUT_SEC: "180"
        run: |
          make publish-smoke \
            IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" \
            PLATFORM="linux/arm64" \
            EXPECTED_BUN_VERSION="${{ needs.resolve-runtime-versions.outputs.bun_version }}" \
            EXPECTED_RESTIC_VERSION="${{ needs.resolve-runtime-versions.outputs.restic_version }}"

  # Merge digests into a single multi-arch manifest
  merge:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create and push multi-arch manifest
        working-directory: /tmp
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-amd64.outputs.digest }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-arm64.outputs.digest }}

      - name: Inspect merged image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  publish-portable-assets:
    name: Publish portable release assets
    runs-on: ubuntu-latest
    needs: [merge, build-portable-artifacts, build-experimental-shell-artifacts]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download portable artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: piclaw-${{ github.ref_name }}-*-portable
          path: artifacts/release
          merge-multiple: true

      - name: Download experimental shell artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: piclaw-desktop-${{ github.ref_name }}-*
          path: artifacts/release
          merge-multiple: true

      - name: Create release if needed and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_TOKEN || secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --verify-tag --generate-notes --title "PiClaw $TAG_NAME"
          gh release upload "$TAG_NAME" artifacts/release/* --clobber

  # GitHub-native cleanup boundary: release/tag pruning stays in workflow-local
  # `github-script` blocks because it depends directly on GitHub Actions context and
  # GitHub REST APIs, with little benefit from repo-local wrapper scripts.
  prune-releases:
    name: Prune old releases
    runs-on: ubuntu-latest
    needs: publish-portable-assets
    permissions:
      contents: write
    steps:
      - name: Prune releases and tags
        uses: actions/github-script@v9
        with:
          script: |
            const keep = 15;
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            releases.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            core.info(`Found ${releases.length} releases; keeping latest ${keep}.`);
            const toDelete = releases.slice(keep);
            for (const release of toDelete) {
              core.info(`Deleting release ${release.tag_name} (id ${release.id})`);
              try {
                await github.rest.repos.deleteRelease({
                  owner,
                  repo,
                  release_id: release.id,
                });
              } catch (error) {
                core.warning(`Failed to delete release ${release.tag_name}: ${error.message}`);
              }
              if (!release.tag_name) {
                core.info(`Release ${release.id} has no tag.`);
                continue;
              }
              try {
                const refs = await github.rest.git.listMatchingRefs({
                  owner,
                  repo,
                  ref: `tags/${release.tag_name}`,
                });
                if (refs.data.length === 0) {
                  core.info(`Tag ${release.tag_name} not found; skipping.`);
                  continue;
                }
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `tags/${release.tag_name}`,
                });
              } catch (error) {
                core.warning(`Failed to delete tag ${release.tag_name}: ${error.message}`);
              }
            }

  # GitHub-native cleanup boundary: Actions run/artifact pruning remains in YAML
  # because it depends directly on GitHub Actions REST APIs and the release graph.
  cleanup-actions-history:
    name: Cleanup Actions runs and artifacts
    runs-on: ubuntu-latest
    needs: publish-portable-assets
    permissions:
      contents: read
      actions: write

    steps:
      - name: Delete Actions runs and artifacts older than the last 5 releases
        uses: actions/github-script@v9
        with:
          script: |
            const keepReleaseCount = 5;
            const { owner, repo } = context.repo;
            const currentRunId = context.runId;

            core.info(`Resolving cutoff from the latest ${keepReleaseCount} releases...`);
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const sortedReleases = releases
              .filter((release) => !release.draft && release.created_at)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            if (sortedReleases.length === 0) {
              core.info('No releases found; skipping Actions history cleanup.');
              return;
            }

            const keptReleases = sortedReleases.slice(0, keepReleaseCount);
            const cutoffRelease = keptReleases[keptReleases.length - 1];
            const cutoff = new Date(cutoffRelease.created_at);
            core.info(
              `Keeping Actions history from ${cutoff.toISOString()} onward ` +
              `(oldest kept release: ${cutoffRelease.tag_name || cutoffRelease.name || cutoffRelease.id}).`
            );

            core.info('Fetching workflow runs across all workflows...');
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              per_page: 100,
            });

            const runsToDelete = runs.filter((run) => {
              if (run.id === currentRunId) return false;
              if (run.status !== 'completed') return false;
              const createdAt = new Date(run.created_at);
              return Number.isFinite(createdAt.valueOf()) && createdAt < cutoff;
            });

            core.info(
              `Found ${runs.length} workflow runs; deleting ${runsToDelete.length} completed run(s) older than cutoff.`
            );
            for (const run of runsToDelete) {
              core.info(`Deleting workflow run #${run.run_number} (${run.name || run.workflow_id}) from ${run.created_at}`);
              try {
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });
              } catch (error) {
                core.warning(`Failed to delete workflow run ${run.id}: ${error.message}`);
              }
            }

            core.info('Fetching Actions artifacts...');
            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner,
              repo,
              per_page: 100,
            });

            const artifactsToDelete = artifacts.filter((artifact) => {
              const createdAt = new Date(artifact.created_at);
              return Number.isFinite(createdAt.valueOf()) && createdAt < cutoff;
            });

            core.info(
              `Found ${artifacts.length} Actions artifacts; deleting ${artifactsToDelete.length} artifact(s) older than cutoff.`
            );
            for (const artifact of artifactsToDelete) {
              core.info(`Deleting artifact ${artifact.name} (id ${artifact.id}) from ${artifact.created_at}`);
              try {
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: artifact.id,
                });
              } catch (error) {
                core.warning(`Failed to delete artifact ${artifact.id}: ${error.message}`);
              }
            }

            core.info('Actions history cleanup completed.');

  # GitHub-native cleanup boundary: GHCR package pruning remains in `github-script`
  # because it uses GitHub package APIs directly and is not meaningfully reusable
  # as a local repo command.
  prune-docker-images:
    name: Prune old Docker images
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      packages: write
    steps:
      - name: Delete untagged images
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.RELEASES_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const keepCount = 5;
            const { owner, repo } = context.repo;
            const packageName = repo.toLowerCase();

            core.info(`Cleaning Docker images for repository: ${owner}/${repo}`);
            core.info(`Package name in registry: ${packageName}`);

            try {
              const versions = await github.paginate(
                github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg,
                {
                  package_type: 'container',
                  package_name: packageName,
                  org: owner,
                  per_page: 100,
                  state: 'active',
                }
              );

              core.info(`Found ${versions.length} package versions`);

              const taggedVersions = versions.filter(
                v => v.metadata?.container?.tags?.length > 0
              );
              const untaggedVersions = versions.filter(
                v => !v.metadata?.container?.tags || v.metadata.container.tags.length === 0
              );

              core.info(
                `Tagged versions: ${taggedVersions.length}, Untagged versions: ${untaggedVersions.length}`
              );

              const sortedTagged = taggedVersions.sort(
                (a, b) => new Date(b.created_at) - new Date(a.created_at)
              );

              const oldestKept = sortedTagged.length > 0
                ? new Date(sortedTagged[Math.min(keepCount, sortedTagged.length) - 1].created_at)
                : new Date();
              core.info(`Oldest kept tag created at: ${oldestKept.toISOString()}`);

              const untaggedToDelete = untaggedVersions.filter(v =>
                new Date(v.created_at) < oldestKept
              );
              core.info(`Untagged versions to delete: ${untaggedToDelete.length} (keeping ${untaggedVersions.length - untaggedToDelete.length} that may be referenced by kept tags)`);

              for (const version of untaggedToDelete) {
                core.info(
                  `Deleting untagged version ${version.id} (created: ${version.created_at})`
                );
                try {
                  await github.rest.packages.deletePackageVersionForOrg({
                    package_type: 'container',
                    package_name: packageName,
                    org: owner,
                    package_version_id: version.id,
                  });
                } catch (error) {
                  core.warning(
                    `Failed to delete untagged version ${version.id}: ${error.message}`
                  );
                }
              }

              const versionsToDelete = sortedTagged.slice(keepCount);

              core.info(
                `Keeping ${keepCount} newest tagged versions, deleting ${versionsToDelete.length} older ones...`
              );
              for (const version of versionsToDelete) {
                const tags = version.metadata?.container?.tags?.join(', ') || 'unknown';
                core.info(
                  `Deleting version ${version.id} with tags: ${tags} (created: ${version.created_at})`
                );
                try {
                  await github.rest.packages.deletePackageVersionForOrg({
                    package_type: 'container',
                    package_name: packageName,
                    org: owner,
                    package_version_id: version.id,
                  });
                } catch (error) {
                  core.warning(
                    `Failed to delete version ${version.id}: ${error.message}`
                  );
                }
              }
            } catch (error) {
              if (error.status === 404) {
                core.info('No package found - this might be the first build');
              } else {
                core.setFailed(`Error managing package versions: ${error.message}`);
              }
            }
