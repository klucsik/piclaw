<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>PiClaw — Visual</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0a0a0a; color: #e0e0e0;
    display: flex; align-items: center; justify-content: center;
    height: 100dvh;
  }
  .placeholder {
    text-align: center; padding: 2rem;
    border: 1px solid #333; border-radius: 12px;
    max-width: 400px;
  }
  h1 { font-size: 1.4rem; font-weight: 600; margin: 0 0 0.5rem; }
  p { font-size: 0.9rem; color: #888; margin: 0; line-height: 1.5; }
  a { color: #3b82f6; }
</style>
</head>
<body>
<div class="placeholder">
  <h1>Visual UI</h1>
  <p>This UI layer is under development.<br/>
  Switch back to classic with <code>PICLAW_WEB_UI_MODE=classic</code>.</p>
</div>
</body>
</html>
